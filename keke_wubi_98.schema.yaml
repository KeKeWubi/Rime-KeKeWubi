schema:
  schema_id: "keke_wubi_98"
  name: "可可五笔 - 98版五笔"
  version: "0.1"

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - table_translator
  filters:
    - simplifier@tradition

translator:
  dictionary: keke_wubi_98_common
  enable_charset_filter: true
  enable_sentence: false
  enable_completion: false

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz"
  initials: "abcdefghijklmnopqrstuvwxyz"
  auto_select: false
  max_length: 4

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中, En ]
  - name: ascii_punct
    reset: 1
    states: [ 中文标点, 英文标点 ]

# 直接调用系统自带的标准标点库
punctuator:
  import_preset: default
  ascii_punct:
    hotkey: "Control+period"