schema:
  schema_id: "keke_wubi_nc"
  name: "可可五笔 - 新世纪版"
  version: "1.0"
  icon: "img/zh.ico"
  ascii_icon: "img/en.ico"
  author:
    - 苏轲 <iSuke@msn.com>
  description: |
    可可五笔<https://keke.kim/>移植

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - table_translator
    - lua_translator@*command_translator
  filters:
    - simplifier@tradition

translator:
  dictionary: keke_wubi_nc_common
  enable_charset_filter: true
  enable_sentence: false
  enable_completion: true

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz"
  initials: "abcdefghijklmnopqrstuvwxyz"
  auto_select: false
  max_length: 4

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中, En ]
  - name: ascii_punct
    reset: 0
    states: [ 中文标点, 英文标点 ]

punctuator:
  import_preset: default
  ascii_punct:
    hotkey: "Control+period"

key_binder:
  import_preset: default

recognizer:
  import_preset: default
