patch:
  # 输入法切换列表
  schema_list:
    - schema: keke_wubi_86
    - schema: keke_wubi_98
    - schema: keke_wubi_nc

  # 菜单与界面
  menu:
    page_size: 5
  switcher:
    hotkeys:
      - "Control+0"
      - "Shift+Control+0"
    abbreviate_options: true
    caption: "【 输入法设置 】"
    option_list_separator: "｜"

  # 只有在中英文切换时才修改状态
  ascii_composer:
    good_old_caps_lock: true
    switch_key:
      Caps_Lock: commit_code
      Shift_L: commit_code
      Shift_R: commit_code
      Control_L: noop
      Control_R: noop

  # 识别规则
  recognizer:
    patterns:
      email: "^[-_.0-9A-Za-z]+@.*$"
      uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
      url: "^(www[.]|https?:|ftp[.:]|mailto:|file:|localhost).*$"